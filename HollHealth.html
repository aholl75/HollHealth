                      if(showImport.day===3) cur[5]={...d,dayNumber:6};
                      savePlans({...plans, [showImport.mon]: cur});
                      setShowImport(null); setImportText('');
                    } else if (showImport.mode==='grocery') {
                      if (!data.categories) throw new Error('Expected JSON with categories array');
                      const filledGroc = gapFillGrocery(data, plans[showImport.mon] || []);
                      saveGroc({...groc, [showImport.mon]: filledGroc});
                      setShowImport(null); setImportText('');
                    } else if (showImport.mode==='fillcards' || showImport.mode==='bulkrecipes') {
                      if (!Array.isArray(data)) throw new Error('Expected a JSON array of recipes.');
                      if (data.length === 0) throw new Error('Recipe array is empty.');
                      const newEntries = {};
                      data.forEach(r => { if(r && r.name) newEntries[normName(r.name)] = r; });
                      saveRecipeLibrary({...recipeLibrary, ...newEntries});
                      setShowImport(null); setImportText('');
                      setErr(null);
                    } else if (showImport.mode==='recipesonly') {
                      if (!Array.isArray(data)) throw new Error('Expected a JSON array of recipes. Make sure you copied the full response.');
                      if (data.length === 0) throw new Error('Recipe array is empty.');
                      saveRecipesForMon(data, showImport.mon);
                      setShowImport(null); setImportText('');
                      setErr(null);
                    } else if (showImport.mode==='recipe') {
                      if (!data.ingredients || !data.steps) throw new Error('Expected recipe JSON with ingredients and steps');
                      // Save under both the returned name and the requested name so normName lookup always finds it
                      const recipeToSave = {...data, name: data.name || showImport.name};
                      const libUpdate = {...recipeLibrary};
                      libUpdate[normName(recipeToSave.name)] = recipeToSave;
                      if (showImport.name && normName(showImport.name) !== normName(recipeToSave.name)) {
                        libUpdate[normName(showImport.name)] = recipeToSave;
                      }
                      saveRecipeLibrary(libUpdate);
                      setRecipe({name:showImport.name, portion:showImport.portion, data:recipeToSave, loading:false, error:null});
                      setShowImport(null); setImportText('');
                    } else if (showImport.mode==='replacedish') {
                      // Claude returns two JSON objects separated by a newline — meal slot + recipe card
                      const parts = importText.replace(/```json|```/g,'').trim().split(/\n(?=\{)/);
                      const mealData = JSON.parse(parts[0]);
                      const recipeData = parts[1] ? JSON.parse(parts[1]) : null;
                      if (!mealData.items || !Array.isArray(mealData.items)) throw new Error('Expected a meal slot JSON object with an items array');
                      (async () => {
                        const np = JSON.parse(JSON.stringify(plans));
                        const {di, mi} = showImport;
                        np[mon][di].meals[mi] = {
                          ...np[mon][di].meals[mi],
                          slot: mealData.slot || showImport.slot,
                          totalCalories: mealData.totalCalories,
                          protein: mealData.protein,
                          fat: mealData.fat,
                          carbs: mealData.carbs,
                          items: mealData.items,
                        };
                        recalc(np[mon][di]);
                        if(di===0){np[mon][3]=JSON.parse(JSON.stringify(np[mon][0]));np[mon][3].dayNumber=4;}
                        if(di===1){np[mon][4]=JSON.parse(JSON.stringify(np[mon][1]));np[mon][4].dayNumber=5;}
                        if(di===2){np[mon][5]=JSON.parse(JSON.stringify(np[mon][2]));np[mon][5].dayNumber=6;}
                        await savePlans(np);
                        if (recipeData && recipeData.name) {
                          saveRecipeLibrary({...recipeLibrary, [normName(recipeData.name)]: recipeData});
                        }
                        setShowImport(null); setImportText('');
                        setErr(null);
                      })();
                    } else if (showImport.mode==='fullpackage') {
                      if (lockedMonths[showImport.mon]) throw new Error('Month ' + showImport.mon + ' is locked. Click the Lock Month button in the Planner to unlock it before importing a new plan.');
                      if (!data.plan || !Array.isArray(data.plan)) throw new Error('Expected JSON with a "plan" array of 7 days');
                      if (!data.grocery?.categories) throw new Error('Expected JSON with a "grocery" object');
                      if (!data.recipes || !Array.isArray(data.recipes)) throw new Error('Expected JSON with a "recipes" array');
                      (async () => {
                        const wk = data.plan.map((d,i) => ({...d, dayNumber:i+1}));
                        const filledGroc = gapFillGrocery(data.grocery, wk);
                        await savePlans({...plans, [showImport.mon]: wk});
                        await saveGroc({...groc, [showImport.mon]: filledGroc});
                        saveRecipesForMon(data.recipes, showImport.mon);
                        setShowImport(null); setImportText('');
                        setErr(null);
                      })();
                    }
                  } catch(e) {
                    setImportErr('Invalid JSON: ' + e.message + '. Make sure you copied the full response from Claude.');
                  }
                }}>✓ Import</button>
                <button style={S.btn('out')} onClick={() => { setShowImport(null); setImportText(''); setImportErr(''); }}>Cancel</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══ RECIPE MODAL ══ */}
      {recipe && (
        <div className="hh-modal-wrap" style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}} onClick={() => setRecipe(null)}>
          <div className="hh-modal-box" style={{background:'white',borderRadius:20,maxWidth:540,width:'100%',maxHeight:'88vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 70px rgba(0,0,0,0.3)'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'20px 24px 14px',borderBottom:'1px solid #f0ece4',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,lineHeight:1.3,paddingRight:16}}>{recipe.name}</div>
                  {recipe.portion && <div style={{fontSize:12,color:'#9a9a8a',marginTop:3}}>Serving: {recipe.portion}</div>}
                </div>
                <button onClick={() => setRecipe(null)} style={{background:'none',border:'none',fontSize:22,color:'#bbb',lineHeight:1,padding:'0 0 0 12px',flexShrink:0}}>×</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'18px 24px 28px'}}>
              {recipe.loading && <div style={{textAlign:'center',padding:48}}><Spinner label="Loading…"/></div>}
              {!recipe.data && !recipe.loading && !recipe.error && (
                <div style={{textAlign:'center',padding:32,color:'#7a7a6a'}}>
                  <div style={{fontSize:36,marginBottom:12}}>📋</div>
                  <div style={{fontSize:14,fontWeight:600,marginBottom:8,color:'#1a1a1a'}}>Recipe not yet imported</div>
                  <div style={{fontSize:13,marginBottom:8,lineHeight:1.7}}>
                    This recipe isn't in your saved data yet. Use <strong>📋 Reimport Recipes</strong> in the Planner
                    to import all recipes for the current month at once.
                  </div>
                  <div style={{fontSize:12,color:'#9a9a8a',marginBottom:20}}>
                    Or get just this one recipe from Claude:
                  </div>
                  <button style={S.btn()} onClick={() => {
                    setShowImport({mode:'recipe', name:recipe.name, portion:recipe.portion});
                    setRecipe(null);
                  }}>📋 Get This Recipe from Claude</button>
                </div>
              )}
              {recipe.error && (
                <div style={{padding:16,background:'#fef2f2',borderRadius:10,color:'#991b1b',fontSize:13}}>
                  ⚠ {recipe.error}
                  <button style={{...S.btn('out'),marginTop:12,fontSize:12}} onClick={() => openRecipe(recipe.name,recipe.portion)}>Try again</button>
                </div>
              )}
              {recipe.data && (() => {
                const d = recipe.data;
                return (
                  <>
                    <div style={{display:'flex',gap:8,marginBottom:18,flexWrap:'wrap'}}>
                      {[['⏱ Prep',d.prepTime],['🔥 Cook',d.cookTime],['🍽️ Serves',d.servingSize]].filter(([,v])=>v).map(([l,v]) => (
                        <div key={l} style={{padding:'5px 12px',background:'#f4f0e9',borderRadius:20,fontSize:12,fontWeight:600,color:'#555'}}>{l}: {v}</div>
                      ))}
                    </div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,marginBottom:10,color:'#1b3d2a'}}>Ingredients</div>
                    <div style={{marginBottom:18}}>
                      {d.ingredients?.map((ing,i) => (
                        <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'7px 12px',background:i%2===0?'#faf7f2':'white',borderRadius:7,fontSize:13,marginBottom:3}}>
                          <span style={{fontWeight:500}}>{ing.item}</span>
                          <span style={{color:'#7a7a6a',fontWeight:600,marginLeft:16,flexShrink:0}}>{ing.amount}</span>
                        </div>
                      ))}
                    </div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,marginBottom:10,color:'#1b3d2a'}}>Instructions</div>
                    <div style={{marginBottom:d.tips?18:0}}>
                      {d.steps?.map((step,i) => (
                        <div key={i} style={{display:'flex',gap:12,marginBottom:10}}>
                          <div style={{width:24,height:24,borderRadius:'50%',background:'#1b3d2a',color:'white',fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1}}>{i+1}</div>
                          <div style={{fontSize:13,color:'#333',lineHeight:1.7,flex:1}}>{step}</div>
                        </div>
                      ))}
                    </div>
                    {d.tips && (
                      <div style={{padding:'12px 16px',background:'#edf7f0',borderRadius:10,border:'1px solid #b6d9be'}}>
                        <div style={{fontSize:11,fontWeight:800,color:'#1b3d2a',marginBottom:4,letterSpacing:'0.4px'}}>💡 TIP</div>
                        <div style={{fontSize:13,color:'#1b3d2a',lineHeight:1.7}}>{d.tips}</div>
                      </div>
                    )}
                  </>
                );
              })()}
            </div>
          </div>
        </div>
      )}

      {/* ══ DATA PANEL (export / import between devices) ══ */}
      {showData && (
        <div className="hh-modal-wrap" style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.65)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}}
          onClick={() => setShowData(false)}>
          <div className="hh-modal-box" style={{background:'white',borderRadius:20,maxWidth:560,width:'100%',maxHeight:'85vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 70px rgba(0,0,0,0.3)'}}
            onClick={e => e.stopPropagation()}>
            <div style={{padding:'20px 24px 16px',borderBottom:'1px solid #f0ece4',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}}>Backup &amp; Sync Data</div>
              <button onClick={() => setShowData(false)} style={{background:'none',border:'none',fontSize:22,color:'#bbb',lineHeight:1}}>×</button>
            </div>
            <div style={{padding:'20px 24px',overflowY:'auto'}}>
              <p style={{fontSize:13,color:'#7a7a6a',marginBottom:20,lineHeight:1.7}}>
                Use this to move your data between devices (laptop ↔ phone) or create a backup.
                Export saves everything to a JSON file. Import restores it.
              </p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                <div style={{padding:'18px',background:'#edf7f0',borderRadius:12,border:'1px solid #b6d9be'}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:6,color:'#1b3d2a'}}>⬇ Export</div>
                  <div style={{fontSize:12,color:'#5a8e6a',marginBottom:14,lineHeight:1.6}}>Download all your plans, progress, and settings as a backup file.</div>
                  <button style={{...S.btn(),width:'100%'}}
                    title="Download all plans, progress notes, grocery lists, and settings as a dated JSON file"
                    onClick={() => {
                    const data = {
                      plans: plans, notes: notes, groc: groc,
                      water: water, customT: customT, totalMon: totalMon,
                      exportDate: new Date().toISOString(),
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = `HollHealth-backup-${new Date().toISOString().slice(0,10)}.json`;
                    document.body.appendChild(a); a.click(); document.body.removeChild(a);
                    URL.revokeObjectURL(url);
                  }}>⬇ Download Backup</button>
                </div>
                <div style={{padding:'18px',background:'#eff6ff',borderRadius:12,border:'1px solid #bfdbfe'}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:6,color:'#1e40af'}}>⬆ Import</div>
                  <div style={{fontSize:12,color:'#3b82f6',marginBottom:14,lineHeight:1.6}}>Restore from a backup file. This will replace your current data.</div>
                  <label title="Select a previously downloaded backup JSON file to restore all your data — this replaces current data"
                    style={{...S.btn('out'),width:'100%',display:'block',textAlign:'center',cursor:'pointer',boxSizing:'border-box'}}>
                    ⬆ Choose File
                    <input type="file" accept=".json" style={{display:'none'}} onChange={e => {
                      const file = e.target.files[0]; if (!file) return;
                      const reader = new FileReader();
                      reader.onload = (ev) => {
                        try {
                          const d = JSON.parse(ev.target.result);
                          if (d.plans)   savePlans(d.plans);
                          if (d.notes)   saveNotes(d.notes);
                          if (d.groc)    saveGroc(d.groc);
                          if (d.water)   saveWater(d.water);
                          if (d.customT) saveCustomT(d.customT);
                          if (d.totalMon){ setTotalMon(d.totalMon); LS.set('hn_totmon', String(d.totalMon)); }
                          alert('Data imported successfully!');
                          setShowData(false);
                        } catch(err) { alert('Invalid backup file: ' + err.message); }
                      };
                      reader.readAsText(file);
                    }}/>
                  </label>
                </div>
              </div>
              <div style={{marginTop:16,padding:'12px 16px',background:'#faf7f2',borderRadius:10,fontSize:12,color:'#7a7a6a',lineHeight:1.7}}>
                <strong>Tip:</strong> To sync laptop ↔ phone — export on one device, then open the HTML file on the other device, go to Backup &amp; Sync, and import the file.
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ══ SWAP MODAL ══ */}
      {swap && (
        <div className="hh-modal-wrap" style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.6)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}} onClick={() => setSwap(null)}>
          <div className="hh-modal-box" style={{background:'white',borderRadius:20,maxWidth:520,width:'100%',maxHeight:'88vh',overflow:'hidden',display:'flex',flexDirection:'column',boxShadow:'0 24px 70px rgba(0,0,0,0.3)'}} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'18px 24px 14px',borderBottom:'1px solid #f0ece4',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}}>Swap Item</div>
                <button onClick={() => setSwap(null)} style={{background:'none',border:'none',fontSize:22,color:'#bbb',lineHeight:1}}>×</button>
              </div>
              <div style={{padding:'10px 14px',background:'#fef2f2',borderRadius:10,display:'flex',justifyContent:'space-between',alignItems:'center',gap:12}}>
                <div>
                  <div style={{fontWeight:700,color:'#991b1b',marginBottom:2,fontSize:10,letterSpacing:'0.5px'}}>REPLACING</div>
                  <div style={{fontWeight:700,fontSize:13}}>{swap.item.name}</div>
                  <div style={{color:'#9a9a8a',fontSize:11,marginTop:2}}>{swap.item.calories} cal · P:{swap.item.protein}g · F:{swap.item.fat}g · C:{swap.item.carbs}g</div>
                </div>
                <div style={{flexShrink:0,fontSize:11,color:'#7a7a6a',textAlign:'right'}}>
                  <div style={{fontWeight:700,color:'#444',marginBottom:2}}>{swap.slot}</div>
                  <div>{swap.item.portion}</div>
                </div>
              </div>
              <div style={{display:'flex',gap:6,marginTop:12}}>
                {[['library','📖 Food Swap Bible'],['ai','✨ AI Suggestions']].map(([id,lbl]) => (
                  <button key={id} onClick={() => { setSwapTab(id); if(id==='ai') loadAiAlts(); }}
                    style={{padding:'6px 14px',borderRadius:20,border:`2px solid ${swapTab===id?'#1b3d2a':'#ddd'}`,background:swapTab===id?'#1b3d2a':'white',color:swapTab===id?'white':'#888',fontSize:12,fontWeight:700,transition:'all 0.15s'}}>
                    {lbl}
                  </button>
                ))}
              </div>
            </div>
            <div style={{flex:1,overflowY:'auto',padding:'14px 24px 24px'}}>
              {swapTab==='library' && (
                <>
                  {isDish(swap.item.name) && (
                    <div style={{padding:'9px 12px',background:'#fffbeb',border:'1px solid #fde68a',borderRadius:8,fontSize:12,color:'#92400e',marginBottom:12,lineHeight:1.6}}>
                      💡 <strong>{swap.item.name}</strong> is a composed dish. Use the button below to replace it with a different dish with matching macros, or browse individual ingredient substitutions below.
                      <div style={{marginTop:8}}>
                        <button style={{...S.btn('sage'),fontSize:12,padding:'6px 14px'}}
                          title="Generate a replacement dish from Claude with matching macros for this slot"
                          onClick={() => {
                            const meal = plans[mon]?.[swap.di]?.meals?.[swap.mi];
                            setSwap(null);
                            setShowImport({
                              mode:'replacedish',
                              mon, day: swap.di+1,
                              slot: swap.slot,
                              replacing: swap.item.name,
                              mealCal: meal?.totalCalories,
                              mealP: meal?.protein,
                              mealF: meal?.fat,
                              mealC: meal?.carbs,
                              di: swap.di, mi: swap.mi,
                            });
                          }}>
                          🔄 Replace This Dish
                        </button>
                      </div>
                    </div>
                  )}
                  <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
                    {swap.cats.map(cat => {
                      const m = SUB_META[cat];
                      return (
                        <button key={cat} onClick={() => setSwap(p=>({...p,activeCat:cat}))}
                          style={{padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:700,transition:'all 0.15s',border:`2px solid ${swap.activeCat===cat?m.color:'#e5e7eb'}`,background:swap.activeCat===cat?m.bg:'white',color:swap.activeCat===cat?m.text:'#888'}}>
                          {m.icon} {cat}
                        </button>
                      );
                    })}
                    {Object.keys(SUBS).filter(c=>!swap.cats.includes(c)).map(cat => {
                      const m = SUB_META[cat];
                      return (
                        <button key={cat} onClick={() => setSwap(p=>({...p,activeCat:cat,cats:[...new Set([...p.cats,cat])]}))}
                          style={{padding:'5px 12px',borderRadius:20,fontSize:11,fontWeight:600,border:'2px dashed #e5e7eb',background:'white',color:'#bbb'}}>
                          {m.icon} {cat}
                        </button>
                      );
                    })}
                  </div>
                  {swap.activeCat && (
                    <>
                      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                        <span style={{fontSize:20}}>{SUB_META[swap.activeCat].icon}</span>
                        <div>
                          <div style={{fontWeight:700,fontSize:13}}>{swap.activeCat} Substitutions</div>
                          <div style={{fontSize:11,color:'#9a9a8a'}}>1 serving each · Food Swap Bible</div>
                        </div>
                      </div>
                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
                        {SUBS[swap.activeCat].map((sub,i) => {
                          const m = SUB_META[swap.activeCat];
                          const isCur = swap.item.name.toLowerCase().includes(sub.name.toLowerCase().split(' ')[0]);
                          return (
                            <div key={i} style={{padding:'10px 12px',background:isCur?'#f0f7f0':m.bg,borderRadius:10,cursor:isCur?'default':'pointer',border:`2px solid ${isCur?'#5a8e6a':m.badge}`,opacity:isCur?0.6:1,transition:'all 0.15s'}}
                              onMouseEnter={e=>{if(!isCur){e.currentTarget.style.borderColor=m.color;e.currentTarget.style.background='white';}}}
                              onMouseLeave={e=>{if(!isCur){e.currentTarget.style.borderColor=m.badge;e.currentTarget.style.background=m.bg;}}}
                              onClick={() => { if(!isCur) doSwap(sub); }}>
                              <div style={{fontWeight:700,fontSize:12,color:'#1a1a1a',lineHeight:1.3}}>
                                {isCur && <span style={{fontSize:9,background:'#5a8e6a',color:'white',borderRadius:4,padding:'1px 5px',marginRight:5}}>CURRENT</span>}
                                {sub.name}
                              </div>
                              <div style={{fontSize:11,color:m.text,fontWeight:600,marginTop:2}}>{sub.portion}</div>
                            </div>
                          );
                        })}
                      </div>
                    </>
                  )}
                </>
              )}
              {swapTab==='ai' && (
                <>
                  <div style={{fontSize:11,color:'#9a9a8a',marginBottom:12,padding:'8px 12px',background:'#faf7f2',borderRadius:8,lineHeight:1.6}}>
                    AI alternatives with matching macros for <strong>{swap.slot}</strong>.
                  </div>
                  {!swap.alts && (
                    <div style={{textAlign:'center',padding:32,color:'#9a9a8a'}}>
                      <div style={{fontSize:32,marginBottom:10}}>✨</div>
                      <div style={{fontSize:13,marginBottom:16}}>Get AI-suggested swaps with macro matching</div>
                      <button style={S.btn()} onClick={loadAiAlts}
                        title="Open the Claude import panel to get macro-matched swap suggestions for this item">Generate Suggestions</button>
                    </div>
                  )}
                  {swap.alts?.map((alt,i) => (
                    <div key={i} style={{padding:'12px 14px',background:'#faf7f2',borderRadius:10,marginBottom:8,border:'2px solid #eee',cursor:'pointer',transition:'all 0.15s'}}
                      onMouseEnter={e=>{e.currentTarget.style.borderColor='#5a8e6a';e.currentTarget.style.background='#f0f7f0';}}
                      onMouseLeave={e=>{e.currentTarget.style.borderColor='#eee';e.currentTarget.style.background='#faf7f2';}}
                      onClick={() => doSwap(alt)}>
                      <div style={{fontWeight:700,fontSize:13,marginBottom:4}}>{alt.name}</div>
                      <div style={{fontSize:12,color:'#7a7a6a'}}>{alt.portion} · <strong>{alt.calories}</strong> cal · P:{alt.protein}g · F:{alt.fat}g · C:{alt.carbs}g</div>
                    </div>
                  ))}
                </>
              )}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(HollNutrition));
  </script>
</body>
</html>
