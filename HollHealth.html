  <script>
    // Step tracker — shows each load stage visibly

      const d = document.createElement('div');

      d.style.color = ok === false ? '#dc2626' : ok === true ? '#16a34a' : '#555';
      steps.appendChild(d);
      return d;
    }
    function updateStep(el, msg, ok) {
      el.innerHTML = (ok === false ? '❌ ' : '✅ ') + msg;
      el.style.color = ok === false ? '#dc2626' : '#16a34a';
    }

    window.onerror = function(msg, src, line, col, err) {
      step('JavaScript error: ' + msg + ' (line ' + line + ')', false);

  <script>

    if (typeof React !== 'undefined' && typeof ReactDOM !== 'undefined' && typeof Babel !== 'undefined') {

      if (typeof ReactDOM === 'undefined') missing.push('ReactDOM');

  <script>
    // Wrap Babel compilation in try/catch to catch JSX parse errors
    window.addEventListener('load', function() {
      if (typeof Babel === 'undefined') return; // CDN blocked — diagnostic already shown
      try {
        const scripts = document.querySelectorAll('script[type="text/babel-pending"]');
        scripts.forEach(s => {
          try {
            // runtime:'classic' forces React.createElement() — prevents Babel from
            // generating "import { jsx } from react/jsx-runtime" which breaks new Function()
            // sourceType:'script' prevents Babel treating the code as an ES module
            const code = Babel.transform(s.textContent, {
              presets: [['react', { runtime: 'classic' }]],
              sourceType: 'script'
            }).code;
            const fn = new Function(code);
            fn();
          } catch(e) {
            document.getElementById('diag').style.display = 'block';
            const d = document.createElement('div');
            d.style.cssText = 'margin-top:12px;padding:14px;background:#fef2f2;border-radius:8px;font-size:13px;font-family:monospace;white-space:pre-wrap;color:#dc2626;';
            d.textContent = 'Babel/JSX Error:\n' + (e.message || String(e));
            document.getElementById('diag').appendChild(d);
          }
        });
      } catch(e) {
        document.getElementById('diag').style.display = 'block';
        step('Babel compilation error: ' + e.message, false);
      }
    });
  </script>

const isNever = (name) => {
  const n = name.toLowerCase();
  if (/\b(vegan|plant.based|veggie|meatless|beyond|impossible)\b/.test(n)) return false;
  return NEVER.some(d => n.includes(d));

// ─── Disliked check: NEVER + current user AVOID list ─────────────────────────
// avoidList is passed in from state so it stays reactive
const isDisliked = (name, avoidList) => {
  const n = name.toLowerCase();
  if (/\b(vegan|plant.based|veggie|meatless|beyond|impossible)\b/.test(n)) return false;
  // Strip parenthetical clarifications like "(no cheese)" before checking
  const stripped = n.replace(/\([^)]*\)/g, '').trim();
  if (isNever(stripped)) return true;
  return (avoidList || DEFAULT_AVOID).some(d => stripped.includes(d));
};
const MILK_RE = /\b(whole milk|cow milk|skim milk|2% milk|milk|almond milk|coconut milk|rice milk)\b/i;
const applyAutoSubs = (dayPlan) => {
  const plan = JSON.parse(JSON.stringify(dayPlan));
  plan.meals.forEach(meal => {
    meal.items = meal.items.map(item => {
      if (MILK_RE.test(item.name) && !/oat milk|soy milk/i.test(item.name)) {
        return {...item, name:'Oat milk', calories:60, protein:2, fat:2, carbs:9, autoSubbed:true, originalName:item.name};
      }
      return item;
    });
  });
  return recalc(plan);
};
const DISH_RE = /\b(bowl|stir.?fry|sheet.?pan|curry(?!\s+powder)|tacos?|taco|soup|chili(?!\s+powder|\s+sauce|\s+flake)|pasta|shells|enchilada|burrito|casserole|stew|risotto|burger|wrap|sandwich|pizza|noodle|stuffed|frittata|pudding|smoothie|pancake|waffle|masala|tikka)\b/i;
// Product/brand patterns that are never dishes despite being multi-word
const PRODUCT_RE = /\b(gomacro|macrobar|quest|clif|rxbar|kind bar|protein bar|protein chip)\b/i;
const isDish = (name) => {
  if (PRODUCT_RE.test(name)) return false;
  // Comma-separated items are ingredient lists, never dishes
  if (name.includes(',')) return false;
  if (DISH_RE.test(name)) return true;
  // Strip parentheticals like "(roasted, cubed)" before word count
  const stripped = name.replace(/\([^)]*\)/g,'').trim();
  return stripped.split(/\s+/).length >= 5;
};

const detectSubCats = (name) => {
  // Composed dishes (multi-word or contains dish keywords) should show all categories
  if (isDish(name)) return ['Protein','Carb','Vegetable','Fat','Fruit'];
  const n = name.toLowerCase();
  const hits = [];
  if (/strawberr|blueberr|blackberr|raspberr|apple|banana|orange|melon|grape|berry|kiwi|apricot|cranberr|passion|tangerine|cantaloupe|watermelon|honeydew/.test(n)) hits.push('Fruit');
  if (/spinach|broccoli|cauliflower|kale|carrot|zucchini|pepper|tomato|onion|garlic|lettuce|arugula|celery|asparagus|brussels|squash|pumpkin|cucumber|pea|leek|radish|green bean|artichoke/.test(n)) hits.push('Vegetable');
  if (/chickpea|lentil|tofu|tempeh|edamame|bean|legume|quinoa|peanut|almond|cashew|pumpkin seed|hemp seed|chia|veggie burger|protein|sausage|egg/.test(n)) hits.push('Protein');
  if (/rice|potato|oat|pasta|bread|corn|yam|raisin|parsnip|grain|noodle|couscous/.test(n)) hits.push('Carb');
  if (/oil|butter|nut|seed|walnut|pecan|pistachio|flax|sesame|sunflower|hemp|chocolate|hummus|tahini/.test(n)) hits.push('Fat');
  return hits.length > 0 ? [...new Set(hits)] : ['Protein','Carb','Vegetable','Fruit'];
};

const recalc = (day) => {
  day.meals.forEach(m => {
    m.totalCalories = m.items.reduce((s,i) => s+i.calories, 0);
    m.protein = m.items.reduce((s,i) => s+i.protein, 0);
    m.fat     = m.items.reduce((s,i) => s+i.fat, 0);
    m.carbs   = m.items.reduce((s,i) => s+i.carbs, 0);
  });
  day.totalCalories = day.meals.reduce((s,m) => s+m.totalCalories, 0);
  day.macros = {
    protein: day.meals.reduce((s,m) => s+m.protein, 0),
    fat:     day.meals.reduce((s,m) => s+m.fat, 0),
    carbs:   day.meals.reduce((s,m) => s+m.carbs, 0),
    fiber:   day.macros?.fiber ?? 0,
  };
  return day;
};
const countFlagged = (dayPlan, avoidList) => {
  if (!dayPlan) return 0;
  return dayPlan.meals.reduce((s,m) => s + m.items.filter(i => isDisliked(i.name, avoidList)).length, 0);
};

// ─── Calorie calculator — Mifflin-St Jeor + activity + goal adjustment ───────
const calcTargetCals = (weightLbs, prefs) => {
  const weightKg = weightLbs * 0.453592;
  const heightCm = (prefs.height || 67) * 2.54;
  const age = prefs.age || 55;
  // Mifflin-St Jeor (male)
  const bmr = Math.round(10 * weightKg + 6.25 * heightCm - 5 * age + 5);
  const actMult = {sedentary:1.2, light:1.375, moderate:1.55, active:1.725}[prefs.activity||'light'] || 1.375;
  const maintenance = Math.round(bmr * actMult);
  const adj = {loss: -250, maintain: 0, build: 200}[prefs.goal||'loss'] || -250;
  return {bmr, maintenance, target: maintenance + adj};
};

// ─── Prompt builder — single source of truth for all Claude prompts ──────────
const buildPrompt = (si, plans, prefs, notes) => {
  if (!si) return '';
  const M = si.mon, D = si.day;

  // Dynamic calorie targets from prefs + latest weight
  const latestWeight = (notes||[]).filter(n=>n.weight).sort((a,b)=>b.date.localeCompare(a.date))[0]?.weight;
  const calcResult = latestWeight ? calcTargetCals(+latestWeight, prefs||{}) : null;
  const goalLabel = {loss:'weight loss', maintain:'weight maintenance', build:'strength building'}[(prefs||{}).goal||'loss'];

  // Build dynamic calorie targets per cycle type
  const baseCals = calcResult ? calcResult.target : null;
  const lowCal   = baseCals ? baseCals : 2255;
  const modCal   = baseCals ? baseCals + 20 : 2235;
  const hiCal    = baseCals ? baseCals + 40 : 2248;
  const CYCLE_TGTS = `Days 1,4,7=low ~${lowCal}cal; Days 2,5=moderate ~${modCal}cal; Days 3,6=high ~${hiCal}cal; Day 7=low ~${lowCal}cal`;

  // Build avoid clause from user's editable list + NEVER
  const avoidItems = [...((prefs||{}).avoidList || DEFAULT_AVOID)];
  const AVOID_STR = avoidItems.length ? `Never use: ${avoidItems.join(', ')}.` : '';
  const DIET = `Vegetarian (eggs + dairy ok, NO meat/fish/seafood/alcohol). ${AVOID_STR} Use oat milk for all milk. Protein Supplement = oat milk shake (150cal 24p 3f 10c).${calcResult ? ` Goal: ${goalLabel} (target ~${baseCals} cal/day).` : ''}`;

  // Favorites injection
  const always = ((prefs||{}).alwaysItems||[]);
  const prefer = ((prefs||{}).preferItems||[]);
  const FAV_STR = [
    always.length ? `Always include somewhere in the week: ${always.join(', ')}.` : '',
    prefer.length ? `Strongly prefer these when macro-appropriate (rotate, do not repeat every day): ${prefer.join(', ')}.` : '',
    'Rotate dinner recipes — do not repeat any dinner from the prior month.',
    'Vary protein sources across the week — do not use eggs as the primary protein in more than 2 breakfast slots or more than once in lunch slots.',
  ].filter(Boolean).join(' ');

  const REC_FMT = `[{"name":"S","servingSize":"S","prepTime":"S","cookTime":"S","ingredients":[{"item":"S","amount":"S"}],"steps":["S"],"tip":"S"}]`;
  const DAY_FMT = `{"dayNumber":N,"cycleType":"low|moderate|high","totalCalories":N,"macros":{"protein":N,"fat":N,"carbs":N,"fiber":N},"meals":[{"slot":"Breakfast|Lunch|Snacks|Dinner|Protein Supplement","totalCalories":N,"protein":N,"fat":N,"carbs":N,"items":[{"name":"S","calories":N,"protein":N,"fat":N,"carbs":N,"portion":"S"}]}]}`;

  if (si.mode === 'week')
    return `Generate a full 7-day vegetarian meal plan for Month ${M} using a 3-day carb cycle (${CYCLE_TGTS}). ${DIET} ${FAV_STR} Return ONLY a JSON array of 7 day objects: [${DAY_FMT}]`;
  if (si.mode === 'day') {
    const CT = ['','low','moderate','high','low','moderate','high','low'][D];
    const CAL = [0,lowCal,modCal,hiCal,lowCal,modCal,hiCal,lowCal][D];
    return `Generate a vegetarian ${CT}-carb meal plan for Day ${D} of Month ${M}. Target ~${CAL} calories. ${DIET} ${FAV_STR} Return ONLY JSON: ${DAY_FMT}`;
  }
  if (si.mode === 'grocery') {
    const wk = (plans && plans[M]) || [];
    const names = [...new Set(wk.filter(Boolean).flatMap(d => d.meals.flatMap(m => m.items.map(i => i.name))))];
    return `Build a grocery list from these specific ingredients: ${names.join(', ')}. Consolidate duplicates, organize by store section. Return ONLY JSON: {"categories":[{"name":"S","items":["S"]}]}`;
  }
  if (si.mode === 'fullpackage')
    return `Generate a complete Month ${M} nutrition package as a SINGLE JSON object.\n${DIET} Carb cycle: ${CYCLE_TGTS}. ${FAV_STR}\nReturn ONLY this JSON structure (no markdown):\n{"plan":[${DAY_FMT}],"grocery":{"categories":[{"name":"S","items":["S"]}]},"recipes":${REC_FMT}}`;
  if (si.mode === 'fillcards') {
    const names = (si.missing||[]).map(r=>r.name);
    return `Generate full recipe JSON for these ${names.length} program recipes. ${DIET} Return ONLY a JSON array (no markdown):\n${REC_FMT}\n\nRecipes needed:\n${names.join('\n')}`;
  }
  if (si.mode === 'bulkrecipes')
    return `Paste a JSON array of recipes to add to your permanent Recipe Library. Each recipe should follow this format:\n${REC_FMT}\nYou can paste recipes from any source — AI generated, nutritionist provided, or manually entered.`;
  if (si.mode === 'recipesonly')
    return `Generate ONLY the recipes array for Month ${M}. ${DIET} Include one recipe per unique meal in the weekly plan. Return ONLY a JSON array (no markdown): ${REC_FMT}`;
  if (si.mode === 'recipe')
    return `Give me a complete recipe for "${si.name}" (serving size: ${si.portion||'1 serving'}). Vegetarian, no meat or fish, use oat milk if milk is needed. Return ONLY JSON: {"name":"S","servingSize":"S","prepTime":"S","cookTime":"S","ingredients":[{"item":"S","amount":"S"}],"steps":["S"],"tips":"S"}`;
  if (si.mode === 'replacedish') {
    const CT = ['','low','moderate','high','low','moderate','high','low'][si.day] || 'low';
    const targetCal = si.mealCal || 600;
    const targetP = si.mealP || 30;
    const targetF = si.mealF || 20;
    const targetC = si.mealC || 40;
    return `Generate a replacement ${si.slot} dish for Day ${si.day} of a vegetarian ${CT}-carb meal plan.\nTarget macros: ~${targetCal} cal, ~${targetP}g protein, ~${targetF}g fat, ~${targetC}g carbs.\n${DIET} ${FAV_STR}\nDo NOT use "${si.replacing}" — provide a completely different dish.\nReturn ONLY this JSON structure for a single meal slot:\n{"slot":"${si.slot}","totalCalories":N,"protein":N,"fat":N,"carbs":N,"items":[{"name":"S","calories":N,"protein":N,"fat":N,"carbs":N,"portion":"S"}]}\nAlso return a recipe card as a second JSON object on a new line:\n{"name":"S","servingSize":"S","prepTime":"S","cookTime":"S","ingredients":[{"item":"S","amount":"S"}],"steps":["S"],"tip":"S"}`;
  }
  return '';
};

// ─── Grocery gap-fill — merges any plan ingredients missing from imported list ─
// Takes a grocery {categories:[]} object and the 7-day week plan array.
// Returns an updated grocery object with missing items appended to the relevant
// category (or a new "Also Needed" category if no match found).
const gapFillGrocery = (grocData, weekPlan) => {
  if (!grocData || !grocData.categories || !weekPlan) return grocData;
  // Build normalized word → category index map from existing items
  const cats = grocData.categories.map(function(c) { return {name:c.name, items:[...c.items]}; });
  const grocWords = new Set();
  cats.forEach(function(cat) {
    cat.items.forEach(function(item) {
      item.toLowerCase().split(/[^a-z]+/).forEach(function(w){ if (w.length > 2) grocWords.add(w); });
    });
  });
  // Category keywords for auto-routing new items
  const CAT_KEYS = [
    {name:'Produce',   words:['berry','berries','banana','apple','kale','spinach','greens','tomato','broccoli','asparagus','cauliflower','sprout','potato','zucchini','pepper','onion','carrot','cucumber','corn','bok','celery','lettuce','arugula','pea','leek','squash']},
    {name:'Protein',   words:['tofu','tempeh','edamame','egg','sausage','chickpea','bean','lentil','protein','powder']},
    {name:'Grains',    words:['rice','oat','quinoa','bread','pasta','flour','grain','pancake','granola','couscous']},
    {name:'Nuts, Seeds and Nut Butters', words:['walnut','almond','pumpkin','hemp','chia','peanut','cashew','seed','nut','butter']},
    {name:'Oils and Condiments', words:['oil','tamari','soy','sauce','vinegar','mustard','tahini']},
    {name:'Pantry',    words:['salt','pepper','garlic','paprika','cumin','turmeric','spice','herb','sugar','flour']},
  ];
  const missing = [];
  const seenMissing = new Set();
  weekPlan.forEach(function(day) {
    if (!day) return;
    (day.meals||[]).forEach(function(meal) {
      (meal.items||[]).forEach(function(item) {
        var name = (item.name||'').trim();
        if (!name) return;
        var nameLower = name.toLowerCase();
        // Skip generic non-shoppable items
        if (nameLower.includes('protein shake') || nameLower.includes('oat milk')) return;
        var words = nameLower.split(/[^a-z]+/).filter(function(w){ return w.length > 3; });
        if (!words.length) return;
        var covered = words.some(function(w){ return grocWords.has(w); });
        if (!covered && !seenMissing.has(nameLower)) {
          seenMissing.add(nameLower);
          var entry = name + (item.portion ? ', ' + item.portion : '');
          missing.push({name: name, entry: entry, words: nameLower.split(/[^a-z]+/)});
        }
      });
    });
  });
  if (missing.length === 0) return grocData;
  // Route each missing item to best matching category
  missing.forEach(function(m) {
    var bestCat = null;
    CAT_KEYS.forEach(function(ck) {
      if (!bestCat && ck.words.some(function(kw){ return m.words.some(function(w){ return w.includes(kw)||kw.includes(w); }); })) {
        bestCat = ck.name;
      }
    });
    // Find the category in cats, or fall back to 'Also Needed'
    var targetCat = cats.find(function(c){ return c.name === bestCat; });
    if (!targetCat) {
      targetCat = cats.find(function(c){ return c.name === 'Also Needed'; });
      if (!targetCat) { targetCat = {name:'Also Needed', items:[]}; cats.push(targetCat); }
    }
    targetCat.items.push(m.entry);
    // Add words to grocWords so duplicates across days don't appear twice
    m.words.forEach(function(w){ if (w.length > 2) grocWords.add(w); });
  });
  return {categories: cats};
};

          // but more reliably: use the meal slot + item names to derive a recipe name
          // We store macros keyed by each item name too so partial matches work
          const mealKey = (meal.items||[]).map(i=>(i.name||'').toLowerCase()).join(' ');
          if (meal.totalCalories > 0) {
            const macros = {cal: meal.totalCalories, p: meal.protein||0, f: meal.fat||0, c: meal.carbs||0, fb: meal.fiber||0};
            // Key by full item name list (for exact recipe matching)

        base[key] = {...base[key], _imported: true, _data: r};
      } else {
        // New recipe not in hardcoded set — look up macros from plan meals by matching
        // ingredient names against the meal macro lookup
        const ingWords = (r.ingredients||[]).map(i=>(i.item||'').toLowerCase()).join(' ');
        let bestMacros = null;
        let bestScore = 0;
        Object.keys(mealMacros).forEach(mealKey => {
          const words = ingWords.split(/\s+/).filter(w => w.length > 3);
          const matches = words.filter(w => mealKey.includes(w)).length;
          if (matches > bestScore) { bestScore = matches; bestMacros = mealMacros[mealKey]; }
        });
        base[key] = {
          name: r.name,
          cal: (bestMacros?.cal) || r.calories || r.cal || 0,
          p:   (bestMacros?.p)   || r.protein  || r.p   || 0,
          f:   (bestMacros?.f)   || r.fat      || r.f   || 0,
          c:   (bestMacros?.c)   || r.carbs    || r.c   || 0,

          cat: r.cat || 'Imported',

    doc.text('Holl:Health', PM, 13);
    doc.setFont('helvetica','normal'); doc.setFontSize(9);
    doc.text('Month '+monthNum+'  |  Weekly Meal Plan  |  '+
      new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}),
      PM, 20);
    // Legend dots on right side of header
    var legendItems = [['Low Carb',[59,125,216]],['Moderate Carb',[201,122,6]],['High Carb',[220,38,38]]];
    var lx = PW - PM;
    for (var li = legendItems.length-1; li >= 0; li--) {
      var lp = legendItems[li];
      doc.setFont('helvetica','bold'); doc.setFontSize(8); doc.setTextColor(...W);
      var lw = doc.getTextWidth(lp[0]);
      doc.text(lp[0], lx - lw, 16);

    // (prevents word-overlap false positives on ingredient-structured plans)
    // Helper: normalise a string for loose comparison — strips cooking states so
    // "red lentils, cooked" matches recipe ingredient "red lentils, dry"
    var normStr = function(s) {
      return (s||'').toLowerCase()
        .replace(/\s*&\s*/g,' and ')
        .replace(/\([^)]*\)/g,'')
        .replace(/[,]/g,'')
        .replace(/\b(cooked|dry|dried|canned|fresh|frozen|roasted|raw|sliced|diced|chopped|minced|grated|cubed|mashed|baked|thawed|rinsed|unsweetened|low.sodium|natural|old.fashioned|roughly)\b/g,' ')

        var matched = null;
        recipeList.forEach(function(rec) {
          if (matched) return;
          if (itemNames.indexOf(normStr(rec.name)) >= 0) matched = rec.name;
        });

        // Pass 2: ingredient-overlap match (ingredient-structured plans)
        // Find the recipe whose ingredients overlap most with this slot's items
        if (!matched && recipeList.length > 0) {
          var bestName = null, bestScore = 0;
          recipeList.forEach(function(rec) {
            if (!rec || !rec.ingredients) return;
            var recIngNorms = (rec.ingredients||[]).map(function(ing) {
              return normStr(ing.item || ing.name || '');

            var score = 0;
            itemNames.forEach(function(itemNorm) {
              if (!itemNorm || itemNorm.length < 4) return;

                return ingNorm === itemNorm ||
                       ingNorm.indexOf(itemNorm) === 0 ||
                       itemNorm.indexOf(ingNorm) === 0;
              });
              if (inRec) score++;
            });
            if (score >= 3 && score > bestScore) { bestScore = score; bestName = rec.name; }
          });

        if (matched) recipeNameForSlot[key] = matched;

    // Overview: Day column has macro summary; meal cells show recipe name (or items if no recipe)

        '\n'+(day.totalCalories||0)+' cal'+
        '  P:'+(mx.protein||0)+'g  F:'+(mx.fat||0)+'g'+
        '\nC:'+(mx.carbs||0)+'g  Fb:'+(mx.fiber||0)+'g';
      var row = [dayCell];
      slotKeys.forEach(function(slot) {
        var meal = (day.meals||[]).find(function(m){return m.slot===slot;});
        if (!meal) { row.push(''); return; }
        if (slot === 'Protein Supplement') {
          row.push('[ ] Oat milk\nprotein shake');
          return;
        }
        var items = (meal.items||[]);

        if (slot === 'Snacks') {
          // Snacks: always list all individual items
          row.push(items.map(function(it){ return '[ ] '+(it.name||''); }).join('\n'));
          return;
        }

        // Priority 1: recipe name matched exactly to a meal item (named-dish plans)
        var recName = recipeNameForSlot[di+'_'+slot];
        if (recName) { row.push('[ ] '+recName); return; }

        // Priority 2: first item that isDish() recognises as a dish name
        var dishItem = null;
        for (var ii = 0; ii < items.length; ii++) {
          if (isDish(items[ii].name||'')) { dishItem = items[ii]; break; }
        }
        if (dishItem) {
          // Show the dish name; if other items remain, list up to 2 more below it
          var others = items.filter(function(it){ return it !== dishItem; });
          var text = '[ ] '+(dishItem.name||'');
          var extra = others.slice(0, 2);
          var remaining = others.length - extra.length;
          if (extra.length) text += '\n' + extra.map(function(it){ return '[ ] '+(it.name||''); }).join('\n');
          if (remaining > 0) text += '\n+ '+remaining+' more';
          row.push(text);
          return;
        }

        // Priority 3: fully ingredient-based slot — cap at 3 with remainder count
        var MAX = 3;
        var shown = items.slice(0, MAX);
        var rest = items.length - MAX;
        var text = shown.map(function(it){ return '[ ] '+(it.name||''); }).join('\n');
        if (rest > 0) text += '\n+ '+rest+' more';
        row.push(text);
      });
      return row;
    });

    // Dynamic row height: fill available page height evenly across 7 rows
    var tableAvailH = PH - y - 18; // leave room for footer
    var rowH = Math.floor(tableAvailH / 7.8); // 7 rows + header
    doc.autoTable({
      startY:y, margin:{left:PM,right:PM},
      head:ovHead, body:ovBody,
      headStyles:{fillColor:G,textColor:W,fontSize:8,fontStyle:'bold',halign:'center',valign:'middle',minCellHeight:8},
      bodyStyles:{fontSize:7,valign:'middle',cellPadding:2.5,overflow:'linebreak',minCellHeight:rowH},
      alternateRowStyles:{fillColor:[248,246,242]},
      columnStyles:{
        0:{cellWidth:46,fontStyle:'bold'},
        1:{cellWidth:50},
        2:{cellWidth:50},
        3:{cellWidth:30},
        4:{cellWidth:52},
        5:{cellWidth:33},
      },
      didParseCell:function(h){
        if(h.section==='body'&&h.column.index===0){
          var dd=days7[h.row.index];
          if(dd){h.cell.styles.fillColor=CYC_COL[dd.cycleType]||G;h.cell.styles.textColor=W;h.cell.styles.fontStyle='bold';}
        }
      },
    });
    footer('Weekly Overview');

    // =========================================================
    // PAGE 2 — Grocery List
    // =========================================================
    newPage();
    y = bigHeader('Grocery List','Month '+monthNum+'  |  Based on your weekly meal plan');
    var gcats = (groceryData&&groceryData.categories)?groceryData.categories:[];

    if (gcats.length===0) {
      doc.setTextColor(...GR); doc.setFontSize(10);
      doc.text('No grocery data. Use Full Package from Claude to generate with your meal plan.',PM,y+20,{maxWidth:PW-PM*2});
    } else {
      // 4-column layout with footer-safe boundary
      var FOOTER_Y = PH - 16; // hard stop above footer
      // Calculate total content height to choose font size
      var totalItems = gcats.reduce(function(s,c){return s+(c.items||[]).length+1;},0);
      var gFS = totalItems > 90 ? 6 : totalItems > 70 ? 6.5 : 7;
      var gLH = gFS + 2;    // line height per item
      var gHH = gFS + 4;    // category header height
      var gGAP = PM * 0.7;  // gap between columns
      var gCols = 4;
      var gcW = (PW - PM*2 - gGAP*(gCols-1)) / gCols;
      var gcXs = [PM, PM+gcW+gGAP, PM+(gcW+gGAP)*2, PM+(gcW+gGAP)*3];
      var gcYs = [y, y, y, y];

      gcats.forEach(function(cat) {
        // Find shortest column that has room for at least the header
        var minY = Math.min(...gcYs);
        var ci = gcYs.indexOf(minY);
        var gcx = gcXs[ci], gcy = gcYs[ci];

        // Category header (sage green background)
        if (gcy + gHH > FOOTER_Y) return; // skip if no room
        doc.setFillColor(...LG);
        doc.roundedRect(gcx, gcy, gcW, gHH, 1, 1, 'F');
        doc.setTextColor(...G);
        doc.setFont('helvetica','bold');
        doc.setFontSize(gFS + 0.5);
        doc.text(cat.name, gcx+2, gcy + gHH/2 + (gFS+0.5)*0.35);
        gcy += gHH + 0.5;

        // Items
        doc.setFont('helvetica','normal');
        doc.setFontSize(gFS);
        (cat.items||[]).forEach(function(item, ii) {
          if (gcy + gLH > FOOTER_Y) return; // hard stop at footer boundary
          doc.setFillColor(ii%2===0?250:255, ii%2===0?249:255, ii%2===0?246:255);
          doc.rect(gcx, gcy - 2, gcW, gLH, 'F');
          doc.setTextColor(40,40,40);
          doc.text('[ ]  '+item, gcx+1.5, gcy - 2 + gLH/2 + gFS*0.35);
          gcy += gLH;
        });
        gcy += 2;
        gcYs[ci] = gcy;
      });
    }
    footer('Grocery List');

    // =========================================================
    // PAGES 3–9 — One page per day, meals only (no recipe steps)
    // =========================================================
    days7.forEach(function(day,di) {
      if(!day) return;
      newPage();
      var daycol = CYC_COL[day.cycleType]||G;
      var dayLabel = CYC_LAB[day.cycleType]||day.cycleType;

      y = bigHeader('Day '+(di+1)+'  -  '+DAYS_L[di],
        'Month '+monthNum+'  |  '+dayLabel+'  |  '+(day.totalCalories||0)+
        ' cal  |  Protein:'+(day.macros?.protein||0)+'g  Fat:'+(day.macros?.fat||0)+'g  Carbs:'+(day.macros?.carbs||0)+'g');

      // Two-column layout: left = Breakfast/Lunch/Snacks, right = Dinner/Protein Supplement
      var colW=(PW-PM*3)/2, lX=PM, rX=PM+colW+PM;
      var lY=y, rY=y;

      var renderSlot = function(slot, cx, cy) {
        var meal=(day.meals||[]).find(function(m){return m.slot===slot;});
        if(!meal) return cy;
        if(cy+10>PH-14) return cy;

        // Slot header
        doc.setFillColor(...daycol);
        doc.roundedRect(cx,cy,colW,7.5,1.5,1.5,'F');
        doc.setTextColor(...W);
        doc.setFont('helvetica','bold'); doc.setFontSize(9);
        doc.text(slot, cx+4, cy+5.2);
        doc.setFont('helvetica','normal'); doc.setFontSize(7.5);
        doc.text((meal.totalCalories||0)+' cal  P:'+(meal.protein||0)+'g  F:'+(meal.fat||0)+'g  C:'+(meal.carbs||0)+'g',
          cx+colW-2, cy+5.2, {align:'right'});
        cy += 9;

        // Items
        (meal.items||[]).forEach(function(item,ii) {
          if(cy>PH-14) return;
          doc.setFillColor(ii%2===0?248:255,ii%2===0?246:255,ii%2===0?241:255);
          doc.rect(cx,cy-3.5,colW,5.5,'F');
          doc.setTextColor(30,30,30); doc.setFont('helvetica','bold'); doc.setFontSize(8);
          doc.text(item.name||'', cx+2, cy);
          doc.setTextColor(...GR); doc.setFont('helvetica','normal'); doc.setFontSize(7);
          doc.text(item.portion||'', cx+72, cy);
          doc.setTextColor(60,60,60); doc.setFontSize(7.5);
          doc.text((item.calories||0)+' cal', cx+colW-2, cy, {align:'right'});
          cy += 5.5;
        });
        cy += 4;
        return cy;
      };

      ['Breakfast','Lunch','Snacks'].forEach(function(s){lY=renderSlot(s,lX,lY);});
      ['Dinner','Protein Supplement'].forEach(function(s){rY=renderSlot(s,rX,rY);});

      footer('Day '+(di+1)+' - '+DAYS_L[di]);
    });

    // =========================================================
    // PAGES 10+ — Full recipe index, one recipe per page
    // =========================================================
    if (recipeList.length > 0) {
      recipeList.forEach(function(rec, ri) {
        if (!rec) return;
        newPage();

        y = bigHeader(rec.name||'Recipe', 'Month '+monthNum+'  |  Preparation Instructions');

        // Meta row (serving size, prep time, cook time) — on its own line, no overlap
        var metaParts = [
          rec.servingSize && ('Serves: '+rec.servingSize),
          rec.prepTime    && ('Prep: '+rec.prepTime),
          rec.cookTime    && ('Cook: '+rec.cookTime)
        ].filter(Boolean);
        if (metaParts.length) {
          doc.setFont('helvetica','normal'); doc.setFontSize(8.5); doc.setTextColor(60,60,60);
          doc.text(metaParts.join('   |   '), PM, y);
          y += 8;
        }

        // Two-column: ingredients left, steps right
        var rColW=(PW-PM*3)/2, rLX=PM, rRX=PM+rColW+PM;
        var rLY=y, rRY=y;

        // Ingredients column header
        doc.setFillColor(...LG); doc.roundedRect(rLX,rLY,rColW,8,1.5,1.5,'F');
        doc.setTextColor(...G); doc.setFont('helvetica','bold'); doc.setFontSize(10);
        doc.text('Ingredients', rLX+4, rLY+5.8); rLY += 10;

        (rec.ingredients||[]).forEach(function(ing,ii) {
          if(rLY>PH-16) return;
          doc.setFillColor(ii%2===0?248:255,ii%2===0?246:255,ii%2===0?241:255);
          doc.rect(rLX,rLY-3.5,rColW,6,'F');
          doc.setTextColor(30,30,30); doc.setFont('helvetica','bold'); doc.setFontSize(8.5);
          doc.text(ing.item||'', rLX+3, rLY);
          doc.setFont('helvetica','normal'); doc.setTextColor(...GR);
          doc.text(ing.amount||'', rLX+rColW-3, rLY, {align:'right'});
          rLY += 6;
        });

        // Instructions column header
        doc.setFillColor(...LG); doc.roundedRect(rRX,rRY,rColW,8,1.5,1.5,'F');
        doc.setTextColor(...G); doc.setFont('helvetica','bold'); doc.setFontSize(10);
        doc.text('Preparation Instructions', rRX+4, rRY+5.8); rRY += 10;

        (rec.steps||[]).forEach(function(step,si) {
          if(rRY>PH-16) return;
          doc.setFillColor(...G); doc.circle(rRX+4,rRY,3.5,'F');
          doc.setTextColor(...W); doc.setFont('helvetica','bold'); doc.setFontSize(7);
          doc.text(String(si+1), rRX+4, rRY+1.2, {align:'center'});
          doc.setTextColor(30,30,30); doc.setFont('helvetica','normal'); doc.setFontSize(8.5);
          var slines=doc.splitTextToSize(step||'', rColW-12);
          doc.text(slines, rRX+10, rRY);
          rRY += slines.length*4.5+3;
        });

        // Tip box at the bottom
        var tip = rec.tip||rec.tips||'';
        if (tip) {
          var tY=Math.max(rLY,rRY)+5;
          if (tY<PH-20) {
            var tLines=doc.splitTextToSize('Tip: '+tip, PW-PM*2-8);
            doc.setFillColor(...LG); doc.roundedRect(PM,tY,PW-PM*2,tLines.length*4.5+8,2,2,'F');
            doc.setTextColor(...G); doc.setFont('helvetica','italic'); doc.setFontSize(8.5);
            doc.text(tLines, PM+4, tY+6);
          }
        }

        footer('Recipe '+(ri+1)+': '+(rec.name||''));
      });
    }

    doc.save('HollHealth-Month'+monthNum+'-'+new Date().toISOString().slice(0,10)+'.pdf');
  };


  // ─── Styles ────────────────────────────────────────────────────────────────────
  const DK = darkMode;

  const applyLayout = (mode) => {

    document.body.classList.toggle('mobile', mob);

    else localStorage.setItem('hn_layout', mode);
    setLayoutMode(mode);
  };
  const S = {
    app:  {fontFamily:"'DM Sans',sans-serif",background:DK?'#1a1f1c':'#f1ede5',minHeight:'100vh',color:DK?'#e8e2d8':'#1a1a1a'},
    hdr:  {background:DK?'#0d1f15':'#1b3d2a',padding:'0 20px',display:'flex',alignItems:'center',

           position:'sticky',top:0,zIndex:60},
    logo: {fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:'white',display:'flex',alignItems:'center',gap:7},
    nb:   (a) => ({padding:'5px 13px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:600,
                   background:a?'rgba(255,255,255,0.18)':'transparent',color:a?'white':'rgba(255,255,255,0.5)',transition:'all 0.15s'}),
    main: {maxWidth:940,margin:'0 auto',padding:'20px 16px 70px'},
    card: {background:DK?'#242b25':'white',borderRadius:14,padding:20,
           boxShadow:DK?'0 1px 6px rgba(0,0,0,0.3)':'0 1px 6px rgba(0,0,0,0.07)',marginBottom:14,
           color:DK?'#e8e2d8':'#1a1a1a'},
    btn:  (v) => ({padding:'8px 18px',borderRadius:9,border:'none',cursor:'pointer',fontSize:13,fontWeight:700,
                   transition:'all 0.15s',
                   background:v==='sage'?'#5a8e6a':v==='out'?'transparent':v==='red'?'#fef2f2':'#1b3d2a',
                   color:v==='out'?(DK?'#a8d8b8':'#1b3d2a'):v==='red'?'#dc2626':'white',
                   border:v==='out'?`1.5px solid ${DK?'#5a8e6a':'#1b3d2a'}`:v==='red'?'1.5px solid #fca5a5':'none'}),
    inp:  {padding:'8px 12px',borderRadius:9,border:`1px solid ${DK?'#3a4a3c':'#ddd'}`,fontSize:13,
           fontFamily:"'DM Sans',sans-serif",background:DK?'#2e3830':'white',color:DK?'#e8e2d8':'#1a1a1a',width:'100%',boxSizing:'border-box'},
    h1:   {fontFamily:"'Playfair Display',serif",fontSize:23,fontWeight:700,marginBottom:4,letterSpacing:'-0.3px',color:DK?'#e8e2d8':'#1a1a1a'},
    sub:  {color:DK?'#9a9a8a':'#7a7a6a',fontSize:13,marginBottom:18},
  };
  const mpBtn = (m) => {

    return {

      whiteSpace:'nowrap',transition:'all 0.15s',
      border:`2px solid ${isSel?(isPrj?'#f59e0b':'#1b3d2a'):isLock?'#5a3e9a':(isPrj?'#fde68a':'#ddd')}`,
      background:isSel?(isPrj?'#fffbeb':'#1b3d2a'):isLock?'#ede9f8':(isPrj?'#fffbeb':'white'),
      color:isSel?(isPrj?'#92400e':'white'):isLock?'#5a3e9a':(isPrj?'#92400e':'#888'),
    };
  };

  return (
    <div style={S.app}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

        ${DK ? `

        /* ── MOBILE LAYOUT (body.mobile) ──────────────────────── */

        .hh-nav-tabs { display:none !important; }

        .hh-header-actions { display:flex; }
        .hh-mob-actions { display:none; }

        body.mobile .hh-header-actions { display:none !important; }
        body.mobile .hh-mob-actions { display:flex !important; }

        /* Cards */
        body.mobile .fi { padding:14px 12px !important; }

        /* Grid overflows — collapse multi-col grids */
        body.mobile [style*="grid-template-columns"] { grid-template-columns:1fr !important; }
        body.mobile [style*="gridTemplateColumns"] { grid-template-columns:1fr !important; }

        /* Date inputs on iOS */
        body.mobile input[type="date"] {
          -webkit-appearance:none; appearance:none;
          width:100% !important; max-width:100% !important;
          box-sizing:border-box;

        /* Modals — slide up from bottom on mobile */
        body.mobile .hh-modal-wrap { align-items:flex-end !important; padding:0 !important; }
        body.mobile .hh-modal-box {
          max-width:100% !important; width:100% !important;
          max-height:92vh; border-radius:18px 18px 0 0 !important;

        body.mobile .hh-month-strip {
          overflow-x:auto; -webkit-overflow-scrolling:touch;
          flex-wrap:nowrap !important; padding-bottom:4px;
        }

        /* ── BOTTOM NAV BAR ───────────────────────────────────── */
        #hh-bottom-nav {
          display:flex;
          position:fixed; bottom:0; left:0; right:0;
          background:${DK?'#0d1f15':'#1b3d2a'};

        .hh-bnav-btn .hh-bnav-icon { font-size:16px; line-height:1; flex-shrink:0; }

        /* Mobile: stack icon above label */
        body.mobile .hh-bnav-btn {
          flex-direction:column; gap:2px; padding:6px 2px;
          font-size:9px; font-weight:700;
          text-transform:uppercase; letter-spacing:0.06em;
        }
        body.mobile .hh-bnav-btn .hh-bnav-icon { font-size:18px; }

        /* Content padding so bottom nav doesn't obscure content */
        #hh-root { padding-bottom:60px; }
        body.mobile #hh-root { padding-bottom:72px; }
      `}</style>

      {/* Header */}
      <header style={S.hdr} id="hh-header">
        <div style={{display:'flex',alignItems:'baseline',gap:7}}>
          <div style={S.logo}>🌿 Holl:Health</div>

          {[['planner', mon <= 9 ? '📊 History' : '📋 Planner'],['recipes','🍽️ Recipes'],['preferences','⚙️ Preferences'],['progress','📓 Progress'],['health','🏥 Health']].map(([id,lbl]) => (

            title={darkMode ? 'Switch to Light Mode' : 'Switch to Dark Mode'}
            style={{background:'rgba(255,255,255,0.12)',color:'white',padding:'5px 11px',fontSize:14,

          <button onClick={() => { setShowHelp(!showHelp); }}

        <div className="hh-mob-actions" style={{display:'none',gap:6}}>

      </header>



      {/* Help */}
      {showHelp && (
        <div style={{background:DK?'#1e2820':'white',borderBottom:`2px solid ${DK?'#3a4a3c':'#e8e2d8'}`,padding:'20px 24px',boxShadow:'0 4px 16px rgba(0,0,0,0.08)'}}>
          <div style={{maxWidth:860,margin:'0 auto'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:'#1b3d2a'}}>How to Build a Monthly Meal Plan</div>
              <button onClick={() => setShowHelp(false)} style={{background:'none',border:'none',fontSize:20,color:'#bbb'}}>×</button>
            </div>

                    style={{width:36,height:36,borderRadius:'50%',border:'none',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',background:i<todayW?'#0891b2':'#e0f2fe',transition:'all 0.2s'}}>

                <button style={{...S.btn('sage'),padding:'8px 16px',fontSize:13}}

                </button>
                {plans[mon] && plans[mon].filter(Boolean).length >= 7 && (
                  <button style={{...S.btn('sage'),padding:'8px 14px',fontSize:12}}
                    title="Generate the PDF package: Weekly Overview, Grocery List, Daily Breakouts, and Recipes"
                    onClick={() => {
                    try {
                      const weekPlan = plans[mon] || [];

                      // Build the definitive set of meal item names used this week
                      // (excluding Protein Supplement and generic items like "Oat Milk Protein Shake")
                      const mealItemNames = new Set();
                      weekPlan.forEach(d => {
                        if (!d) return;
                        (d.meals||[]).forEach(m => {
                          if (m.slot === 'Protein Supplement') return;
                          (m.items||[]).forEach(it => {
                            if (it.name) mealItemNames.add(it.name.toLowerCase().trim());
                          });
                        });
                      });

                      // Build normalised recipe pool: per-month first, then library
                      // Uses shared normName() for consistent key normalisation
                      const recipePool = {};
                      // Per-month recipes are authoritative
                      let perMonthArr = [];
                      try { const rs = LS.get('hn_recipes_m' + mon); if(rs) perMonthArr = JSON.parse(rs.value).filter(Boolean); } catch(ex){}
                      currentRecipes.filter(Boolean).forEach(r => { if(r.name && !perMonthArr.find(p=>normName(p.name)===normName(r.name))) perMonthArr.push(r); });
                      perMonthArr.forEach(r => { if(r && r.name) recipePool[normName(r.name)] = r; });
                      // Library supplements — add by both stored key AND name normalization
                      Object.entries(recipeLibrary).filter(([,r]) => r && r.name).forEach(([storedKey, r]) => {
                        if (!recipePool[storedKey]) recipePool[storedKey] = r;
                        const nameKey = normName(r.name);
                        if (!recipePool[nameKey]) recipePool[nameKey] = r;
                      });

                      if (!Object.keys(recipePool).length) { setErr('No recipes found for Month ' + mon + '. Use 📋 Reimport Recipes to add them.'); return; }

                      // Build avoid set for name filtering (NEVER + user avoid list)
                      const avoidSet = [
                        ...NEVER,
                        ...(prefs.avoidList || DEFAULT_AVOID)
                      ].map(a => a.toLowerCase());

                      // Include a recipe only if its normName matches a dish-level meal item
                      // Only check isDish items — ingredients will never be in the recipe pool
                      const seen = new Set();
                      const rdataFinal = [];

                      mealItemNames.forEach(rawItemName => {
                        // Only attempt recipe lookup for dish-level items
                        if (!isDish(rawItemName)) return;
                        // Strip parentheticals like "(no cheese)" before matching
                        const itemNorm = normName(rawItemName.replace(/\([^)]*\)/g,''));
                        // Try direct pool lookup first, then scan pool values by name
                        let rec = recipePool[itemNorm];
                        if (!rec) {
                          // scan all pool values for a name match
                          rec = Object.values(recipePool).find(r => r && normName(r.name) === itemNorm);
                        }
                        if (!rec) return;
                        if (seen.has(itemNorm)) return;

                        // Filter out recipes whose name contains an avoid/never word
                        const recNameLower = rec.name.toLowerCase();
                        const hasAvoid = avoidSet.some(a => a.length > 3 && recNameLower.includes(a));
                        if (hasAvoid) return;

                        seen.add(itemNorm);
                        rdataFinal.push(rec);
                      });

                      if (!rdataFinal.length) {
                        // Fallback for ingredient-based meal plans (no dish-name items):
                        // Cross-reference perMonthArr against the weekly overview dish names
                        if (perMonthArr.length > 0) {
                          // Collect dish names from the weekly overview (slot display names)
                          const overviewNames = new Set();
                          weekPlan.forEach(d => {
                            if (!d) return;
                            (d.meals||[]).forEach(m => {
                              if (m.slot === 'Protein Supplement') return;
                              // The overview shows the first isDish item, or the meal slot name
                              // Collect all item names that look like dishes
                              (m.items||[]).forEach(it => {
                                if (it.name && isDish(it.name)) overviewNames.add(normName(it.name));
                              });
                            });
                          });

                          const fallback = perMonthArr.filter(r => {
                            if (!r || !r.name) return false;
                            // Filter avoid words
                            const recNameLower = r.name.toLowerCase();
                            if (avoidSet.some(a => a.length > 3 && recNameLower.includes(a))) return false;
                            // If we have overview dish names, only include matching recipes
                            // If no overview names found (all ingredients), include everything
                            if (overviewNames.size > 0) {
                              return overviewNames.has(normName(r.name));
                            }
                            return true;
                          });

                          const useFallback = fallback.length > 0 ? fallback : perMonthArr.filter(r => {
                            if (!r || !r.name) return false;
                            return !avoidSet.some(a => a.length > 3 && r.name.toLowerCase().includes(a));
                          });

                          if (useFallback.length > 0) {
                            const fbSeen = new Set();
                            const fbFinal = useFallback.filter(r => {
                              const k = normName(r.name);
                              if (fbSeen.has(k)) return false;
                              fbSeen.add(k); return true;
                            });
                            generatePDF(plans[mon], groc[mon], fbFinal, mon);
                            return;
                          }
                        }
                        setErr('No matching recipe cards found for this week\'s meals. Use 📋 Reimport Recipes to add them.');
                        return;
                      }
                      generatePDF(plans[mon], groc[mon], rdataFinal, mon);
                    } catch(e) { setErr('PDF error: ' + e.message); }
                  }}>⬇ Download PDF</button>

            {/* Month status card */}
            {(() => {
              const hasPlan = plans[mon] && plans[mon].filter(Boolean).length >= 7;
              const hasGroc = !!(groc[mon]?.categories?.length);
              const recCount = currentRecipes.length;
              const isLocked = !!lockedMonths[mon];
              if (!hasPlan && !isLocked) return null;

              // Find dish-level meal items that have no recipe card — uses shared normName()
              const missingCardMap = {}; // name → [day numbers]
              if (hasPlan) {
                (plans[mon]||[]).forEach((d, di) => {
                  (d?.meals||[]).forEach(m => {
                    if (m.slot === 'Protein Supplement') return;
                    (m.items||[]).forEach(it => {
                      if (!isDish(it.name)) return;
                      const key = normName(it.name);

                  const missing = allDisplayRecipes.filter(r => !r._imported && !r._data);

                    <button style={{...S.btn('out'),padding:'7px 14px',fontSize:12,borderColor:'#f59e0b',color:'#92400e'}}
                      title={`${missing.length} program recipe cards are missing full ingredient and step data. Click to generate a Claude prompt that fills them all at once.`}
                      onClick={() => setShowImport({mode:'fillcards', missing})}>
                      ⚑ Fill {missing.length} Missing Cards
                    </button>
                  ) : (
                    <span style={{fontSize:12,color:'#16a34a',fontWeight:600,padding:'7px 4px'}}>✓ All cards complete</span>
                  );
                })()}
              </div>
            </div>
            <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
              <input style={{...S.inp,flex:1,minWidth:200}}
                placeholder="Search by name, category, or ingredient…"
                title="Search recipe names, categories, ingredients, and steps — e.g. type 'asparagus' to find every recipe that uses it"
                value={rfilt} onChange={e=>setRfilt(e.target.value)}/>
              <select style={{...S.inp,width:160}} value={rsort} onChange={e=>setRsort(e.target.value)}>
                <option value="name">Sort: A–Z</option>
                <option value="cal">Sort: Calories ↑</option>
                <option value="p">Sort: Protein ↓</option>
              </select>
              <div style={{alignSelf:'center',fontSize:13,color:'#9a9a8a'}}>{filteredRecipes.length} shown</div>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:10}}>
              {filteredRecipes.map((r,i) => (
                <div key={i} style={{...S.card,padding:14,margin:0,cursor:'pointer',transition:'box-shadow 0.15s'}}
                  onClick={() => openRecipe(r.name, r._data?.servingSize||'1 serving', r._data||null)}
                  onMouseEnter={e=>e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.11)'}
                  onMouseLeave={e=>e.currentTarget.style.boxShadow='0 1px 6px rgba(0,0,0,0.07)'}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div style={{flex:1,marginRight:8}}>
                      <div style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{r.name}</div>
                      <div style={{fontSize:11,color:r._imported?'#16a34a':'#9a9a8a',marginTop:2,fontWeight:r._imported?600:400}}>
                        {r._imported ? '✓ Full recipe saved' : (CAT_IC[r.cat]||'🍽️') + ' ' + r.cat}
                      </div>
                      {rfilt && !(r.name||'').toLowerCase().includes(rfilt.toLowerCase()) && !(r.cat||'').toLowerCase().includes(rfilt.toLowerCase()) && (
                        <div style={{fontSize:10,color:'#5a8e6a',marginTop:3,fontWeight:600}}>🔍 matched in ingredients</div>
                      )}
                    </div>
                    <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:4,flexShrink:0}}>
                      <div style={{textAlign:'right'}}>
                        <div style={{fontSize:18,fontWeight:800,color:'#1b3d2a',lineHeight:1}}>{r.cal}</div>
                        <div style={{fontSize:10,color:'#9a9a8a'}}>cal</div>
                      </div>
                      {r._imported && (
                        <button
                          title={`Remove "${r.name}" from the recipe library`}
                          onClick={e => {
                            e.stopPropagation();
                            if (!window.confirm(`Remove "${r.name}" from the recipe library?`)) return;
                            const newLib = {...recipeLibrary};
                            // Delete by normName key since library is keyed that way
                            const keyToDelete = Object.keys(newLib).find(k => normName(k) === normName(r.name));
                            if (keyToDelete) delete newLib[keyToDelete];
                            saveRecipeLibrary(newLib);
                          }}
                          style={{fontSize:10,padding:'2px 7px',borderRadius:5,border:'1px solid #fca5a5',background:'#fef2f2',color:'#dc2626',fontWeight:700,cursor:'pointer'}}>
                          🗑 Remove
                        </button>
                      )}
                    </div>
                  </div>
                  <div style={{display:'flex',gap:5,marginBottom:8}}>
                    {[['P',r.p,'#3b82f6'],['F',r.f,'#f59e0b'],['C',r.c,'#10b981'],['Fb',r.fb,'#8b5cf6']].map(([l,v,col]) => (
                      <div key={l} style={{flex:1,textAlign:'center',padding:'4px 0',background:`${col}16`,borderRadius:5}}>
                        <div style={{fontSize:12,fontWeight:700,color:col}}>{v}g</div>
                        <div style={{fontSize:9,color:'#aaa',fontWeight:600}}>{l}</div>
                      </div>
                    ))}
                  </div>
                  <div style={{fontSize:11,color:'#5a8e6a',fontWeight:600,textAlign:'center',padding:'4px 0',borderTop:'1px solid #f0ece4'}}>📋 Tap for ingredients &amp; steps</div>
                </div>
              ))}
            </div>
            {filteredRecipes.length===0 && <div style={{textAlign:'center',padding:40,color:'#9a9a8a'}}>No recipes match "{rfilt}"</div>}
          </div>
        )}

        {/* ══ PROGRESS ══ */}
        {tab==='progress' && (
          <div className="fi">
            <h1 style={S.h1}>Progress Tracker</h1>
            <p style={S.sub}>Log your weight weekly along with any notes.</p>

            {/* Water */}
            <div style={{...S.card,padding:'12px 18px',marginBottom:14,display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10,background:'linear-gradient(135deg,#ecfeff,#f0f9ff)',border:'1.5px solid #a5f3fc'}}>
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{fontSize:22}}>💧</span>
                <div>
                  <div style={{fontWeight:700,fontSize:13,color:'#0e7490'}}>Today's Water</div>
                  <div style={{fontSize:11,color:'#7a7a6a'}}>Goal: 5 bottles (~16 oz / 500ml each)</div>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                {Array.from({length:5},(_,i) => (
                  <button key={i} onClick={() => { const w={...water,[today]:Math.min(5,i<todayW?i:i+1)}; saveWater(w); }}
                    style={{width:36,height:36,borderRadius:'50%',border:'none',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center',background:i<todayW?'#0891b2':'#e0f2fe',transition:'all 0.2s'}}>
                    {i<todayW?'💧':'○'}
                  </button>
                ))}
                <div style={{marginLeft:8,textAlign:'center'}}>
                  <div style={{fontSize:20,fontWeight:800,color:'#0e7490',lineHeight:1}}>{todayW}/5</div>
                  <div style={{fontSize:10,color:todayW===5?'#0e7490':'#7a7a6a',fontWeight:todayW===5?700:400}}>{todayW===5?'✓ Goal!':todayW===0?'Not started':`${5-todayW} to go`}</div>
                </div>
                {todayW>0 && <button onClick={() => saveWater({...water,[today]:0})} style={{background:'none',border:'none',color:'#bbb',fontSize:14}}>↺</button>}
              </div>
            </div>

            {/* Log form */}
            <div style={{...S.card,border:editingNoteId?'2px solid #5a8e6a':'none'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700}}>
                  {editingNoteId ? '✏️ Edit Entry' : 'Weekly Entry · Month '+mon}
                </div>
                {editingNoteId && (
                  <button onClick={() => { setEditingNoteId(null); setNForm({date:new Date().toISOString().slice(0,10),weight:'',month:mon,notes:''}); }}
                    style={{fontSize:11,padding:'3px 10px',borderRadius:7,border:'1px solid #ddd',background:'white',color:'#888',cursor:'pointer'}}>
                    Cancel
                  </button>
                )}
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginBottom:12}}>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:'#9a9a8a',display:'block',marginBottom:4,letterSpacing:'0.5px'}}>DATE</label>
                  <input type="date" value={nForm.date} onChange={e=>setNForm(p=>({...p,date:e.target.value}))} style={S.inp}/>
                </div>
                <div>
                  <label style={{fontSize:10,fontWeight:700,color:'#9a9a8a',display:'block',marginBottom:4,letterSpacing:'0.5px'}}>WEIGHT (lbs)</label>
                  <input type="number" value={nForm.weight} placeholder="e.g. 185" onChange={e=>setNForm(p=>({...p,weight:e.target.value}))} style={S.inp}/>
                </div>
              </div>
              <div style={{marginBottom:14}}>
                <label style={{fontSize:10,fontWeight:700,color:'#9a9a8a',display:'block',marginBottom:4,letterSpacing:'0.5px'}}>NOTES (optional)</label>
                <textarea value={nForm.notes} onChange={e=>setNForm(p=>({...p,notes:e.target.value}))} placeholder="How do you feel? Energy, adherence, observations…" style={{...S.inp,minHeight:70,lineHeight:1.6}}/>
              </div>
              <button style={{...S.btn(),width:'100%'}} onClick={addNote} disabled={!nForm.date||!nForm.weight}
                title={editingNoteId ? 'Save changes to this entry' : 'Save this weight entry to your progress log'}>
                {editingNoteId ? '✓ Save Changes' : '+ Save Entry'}
              </button>
            </div>

            {/* Weight chart */}
            {notes.filter(n=>n.weight).length>=2 && (
              <div style={{...S.card,background:'linear-gradient(135deg,#edf7f0,#f4f0e9)'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700}}>Weight Trend</div>
                  {(() => {
                    const w = notes.filter(n=>n.weight).map(n=>+n.weight);
                    const diff = w[w.length-1]-w[0]; // oldest minus newest: positive = lost weight
                    return <div style={{fontSize:12,fontWeight:700,color:diff>0?'#065f46':diff<0?'#dc2626':'#888'}}>{diff>0?'▼ ':diff<0?'▲ ':''}{Math.abs(diff).toFixed(1)} lbs overall</div>;
                  })()}
                </div>
                <div style={{display:'flex',gap:4,alignItems:'flex-end',height:76,marginBottom:4}}>
                  {notes.filter(n=>n.weight).slice(0,16).reverse().map((n,i,arr) => {
                    const vals=arr.map(x=>+x.weight), mn=Math.min(...vals), rng=Math.max(...vals)-mn||1;
                    const h=Math.round(((+n.weight-mn)/rng)*56)+12;
                    return (
                      <div key={n.id} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,minWidth:0}}>
                        <div style={{fontSize:9,color:'#7a7a6a'}}>{n.weight}</div>
                        <div style={{width:'100%',background:'#1b3d2a',borderRadius:'3px 3px 0 0',height:h,transition:'height 0.4s'}}/>
                        <div style={{fontSize:9,color:'#9a9a8a',overflow:'hidden',width:'100%',textAlign:'center',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.date.slice(5)}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Entry list */}
            {notes.length===0 ? (
              <div style={{...S.card,textAlign:'center',padding:44,color:'#9a9a8a'}}>
                <div style={{fontSize:40,marginBottom:10}}>⚖️</div>
                <div style={{fontSize:14,fontWeight:600,marginBottom:6}}>No entries yet</div>
                <div style={{fontSize:13}}>Log your first weekly weight above.</div>
              </div>
            ) : notes.map(note => (
              <div key={note.id} style={{...S.card,borderLeft:'4px solid #5a8e6a',padding:'14px 18px'}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                  <div style={{display:'flex',gap:18,alignItems:'center',flexWrap:'wrap'}}>
                    <div><div style={{fontSize:10,fontWeight:700,color:'#9a9a8a',letterSpacing:'0.5px'}}>DATE</div><div style={{fontSize:14,fontWeight:700}}>{note.date}</div></div>
                    {note.weight && <div><div style={{fontSize:10,fontWeight:700,color:'#9a9a8a',letterSpacing:'0.5px'}}>WEIGHT</div><div style={{fontSize:20,fontWeight:800,color:'#1b3d2a',lineHeight:1}}>{note.weight} <span style={{fontSize:12,fontWeight:400,color:'#888'}}>lbs</span></div></div>}
                    {note.month && <span style={{padding:'2px 10px',borderRadius:20,background:'#edf7f0',color:'#1b3d2a',fontSize:11,fontWeight:700}}>Month {note.month}</span>}
                  </div>
                  <div style={{display:'flex',gap:4,alignItems:'center'}}>
                    <button onClick={() => {
                      setNForm({date:note.date, weight:note.weight||'', month:note.month||mon, notes:note.notes||''});
                      setEditingNoteId(note.id);
                      window.scrollTo({top:0,behavior:'smooth'});
                    }} title="Edit this entry"
                      style={{fontSize:11,padding:'3px 9px',borderRadius:7,border:'1px solid #b6d9be',background:'#edf7f0',color:'#1b3d2a',cursor:'pointer',fontWeight:600}}>
                      ✏️ Edit
                    </button>
                    <button onClick={async () => saveNotes(notes.filter(x=>x.id!==note.id))} style={{background:'none',border:'none',color:'#ccc',fontSize:20,lineHeight:1,padding:4}}>×</button>
                  </div>
                </div>
                {note.notes && <div style={{marginTop:10,padding:'9px 13px',background:'#faf7f2',borderRadius:8,fontSize:13,color:'#555',lineHeight:1.7}}>{note.notes}</div>}
              </div>
            ))}
          </div>
        )}
        {/* ══ PREFERENCES ══ */}
        {tab==='preferences' && (() => {
          // Calorie calculation using latest weight from progress log
          const latestEntry = notes.filter(n=>n.weight).sort((a,b)=>b.date.localeCompare(a.date))[0];
          const latestWeight = latestEntry ? +latestEntry.weight : null;
          const calc = latestWeight ? calcTargetCals(latestWeight, prefs) : null;

          // Known items from recipe library + plans for autocomplete
          const knownItems = [...new Set([
            ...Object.values(recipeLibrary).map(r=>r.name).filter(Boolean),
            ...Object.values(plans).flatMap(wk=>(wk||[]).flatMap(d=>(d?.meals||[]).flatMap(m=>(m?.items||[]).map(i=>i.name)))).filter(Boolean),
            ...RECIPES.map(r=>r.name),
          ])].sort();

          const addToList = (field, inputField, val) => {
            const v = (val || prefs[inputField] || '').trim();
            if (!v) return;
            if (prefs[field].some(x=>x.toLowerCase()===v.toLowerCase())) return;
            savePrefs({...prefs, [field]:[...prefs[field], v], [inputField]:''});
          };
          const removeFromList = (field, val) => savePrefs({...prefs, [field]:prefs[field].filter(x=>x!==val)});

          return (
            <div className="fi">
              <h1 style={S.h1}>Preferences</h1>
              <p style={S.sub}>Your profile, dietary preferences, and favorite foods — used to personalise every generated meal plan.</p>

              {/* ── Profile & Calorie Target ── */}
              <div style={S.card}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,marginBottom:14}}>👤 Profile & Calorie Target</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:16}}>
                  {[
                    ['Height (inches)', 'height', 'number', 60, 84],
                    ['Age', 'age', 'number', 18, 99],
                  ].map(([lbl,key,type,min,max]) => (
                    <div key={key}>
                      <label style={{fontSize:10,fontWeight:700,color:'#9a9a8a',display:'block',marginBottom:4,letterSpacing:'0.5px'}}>{lbl.toUpperCase()}</label>
                      <input type={type} min={min} max={max} value={prefs[key]||''} style={{...S.inp,textAlign:'center'}}
                        onChange={e => savePrefs({...prefs, [key]:+e.target.value})}/>
                    </div>
                  ))}
                  <div>
                    <label style={{fontSize:10,fontWeight:700,color:'#9a9a8a',display:'block',marginBottom:4,letterSpacing:'0.5px'}}>ACTIVITY LEVEL</label>
                    <select value={prefs.activity||'light'} style={S.inp} onChange={e=>savePrefs({...prefs,activity:e.target.value})}>
                      <option value="sedentary">Sedentary (desk only)</option>
                      <option value="light">Light (daily walks)</option>
                      <option value="moderate">Moderate (gym 3–5×/wk)</option>
                      <option value="active">Active (intense daily)</option>
                    </select>
                  </div>
                  <div>
                    <label style={{fontSize:10,fontWeight:700,color:'#9a9a8a',display:'block',marginBottom:4,letterSpacing:'0.5px'}}>CURRENT GOAL</label>
                    <select value={prefs.goal||'loss'} style={S.inp} onChange={e=>savePrefs({...prefs,goal:e.target.value})}>
                      <option value="loss">⬇ Weight Loss</option>
                      <option value="maintain">⟷ Maintain Weight</option>
                      <option value="build">⬆ Strength Building</option>
                    </select>
                  </div>
                </div>
                {calc ? (
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
                    {[
                      ['BMR',calc.bmr,'cal/day','#8b5cf6','Base metabolic rate at rest'],
                      ['Maintenance',calc.maintenance,'cal/day','#5a8e6a','Calories to stay at current weight'],
                      ['Plan Target',calc.target,'cal/day',prefs.goal==='loss'?'#3b7dd8':prefs.goal==='build'?'#dc2626':'#5a8e6a',
                        prefs.goal==='loss'?'250 cal deficit for ~0.5 lb/wk loss':prefs.goal==='build'?'200 cal surplus for lean gain':'At maintenance'],
                    ].map(([lbl,val,unit,col,note]) => (
                      <div key={lbl} style={{background:'#faf8f4',borderRadius:10,padding:'12px 14px',border:`2px solid ${col}22`}}>
                        <div style={{fontSize:11,color:'#9a9a8a',fontWeight:700,marginBottom:2}}>{lbl.toUpperCase()}</div>
                        <div style={{fontSize:22,fontWeight:800,color:col,lineHeight:1}}>{val}</div>
                        <div style={{fontSize:10,color:'#9a9a8a'}}>{unit}</div>
                        <div style={{fontSize:10,color:'#7a7a6a',marginTop:4,lineHeight:1.5}}>{note}</div>
                      </div>
                    ))}
                  </div>
                ) : (
                  <div style={{padding:'12px 16px',background:'#fffbeb',borderRadius:9,border:'1px solid #fde68a',fontSize:13,color:'#92400e'}}>
                    ◈ Log a weight entry in the Progress tab to enable automatic calorie target calculation.
                  </div>
                )}
                {latestEntry && (
                  <div style={{marginTop:10,fontSize:12,color:'#7a7a6a'}}>
                    Based on latest logged weight: <strong>{latestEntry.weight} lbs</strong> on {latestEntry.date}. Update in the 📓 Progress tab.
                  </div>
                )}
              </div>

              {/* ── Love — Always Include ── */}
              <div style={S.card}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,marginBottom:4}}>❤️ Always Include</div>
                <div style={{fontSize:12,color:'#7a7a6a',marginBottom:14,lineHeight:1.6}}>These items will appear in every generated weekly plan — snacks, packaged products, or specific dishes you want every week.</div>
                <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                  <input list="known-items" style={{...S.inp,flex:1,minWidth:200}}
                    placeholder="e.g. GoMacro MacroBar, pepitas, Quest protein chips…"
                    value={prefs.prefInput||''}
                    onChange={e=>setPrefs(p=>({...p,prefInput:e.target.value}))}
                    onKeyDown={e=>{ if(e.key==='Enter') addToList('alwaysItems','prefInput'); }}/>
                  <datalist id="known-items">{knownItems.map(k=><option key={k} value={k}/>)}</datalist>
                  <button style={{...S.btn(),padding:'8px 16px'}} title="Add to Always Include list"
                    onClick={()=>addToList('alwaysItems','prefInput')}>+ Add</button>
                </div>
                {prefs.alwaysItems.length === 0 ? (
                  <div style={{fontSize:12,color:'#bbb',fontStyle:'italic'}}>No items yet — add your weekly essentials above.</div>
                ) : (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {prefs.alwaysItems.map((item,i) => (
                      <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',background:'#fdf2f8',border:'1.5px solid #fbcfe8',borderRadius:20,fontSize:12,fontWeight:600,color:'#831843'}}>
                        ❤️ {item}
                        <button onClick={()=>removeFromList('alwaysItems',item)} style={{background:'none',border:'none',color:'#bbb',fontSize:14,lineHeight:1,padding:0,cursor:'pointer'}}>×</button>
                      </span>
                    ))}
                  </div>
                )}
              </div>

              {/* ── Love — Prefer Often ── */}
              <div style={S.card}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,marginBottom:4}}>👍 Prefer Often</div>
                <div style={{fontSize:12,color:'#7a7a6a',marginBottom:14,lineHeight:1.6}}>Ingredients and dishes you enjoy and want rotated in regularly — not every week, but whenever macro-appropriate.</div>
                <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
                  <input list="known-items" style={{...S.inp,flex:1,minWidth:200}}
                    placeholder="e.g. Vegan Sausage Sheet Pan, tempeh, edamame…"
                    value={prefs.preferInput||''}
                    onChange={e=>setPrefs(p=>({...p,preferInput:e.target.value}))}
                    onKeyDown={e=>{ if(e.key==='Enter') addToList('preferItems','preferInput'); }}/>
                  <button style={{...S.btn('sage'),padding:'8px 16px'}} title="Add to Prefer Often list"
                    onClick={()=>addToList('preferItems','preferInput')}>+ Add</button>
                </div>
                {prefs.preferItems.length === 0 ? (
                  <div style={{fontSize:12,color:'#bbb',fontStyle:'italic'}}>No items yet — add your preferred foods above.</div>
                ) : (
                  <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                    {prefs.preferItems.map((item,i) => (
                      <span key={i} style={{display:'inline-flex',alignItems:'center',gap:6,padding:'5px 12px',background:'#edf7f0',border:'1.5px solid #b6d9be',borderRadius:20,fontSize:12,fontWeight:600,color:'#1b3d2a'}}>
                        👍 {item}
                        <button onClick={()=>removeFromList('preferItems',item)} style={{background:'none',border:'none',color:'#bbb',fontSize:14,lineHeight:1,padding:0,cursor:'pointer'}}>×</button>
                      </span>
                    ))}
                  </div>
                )}
              </div>

              {/* ── Avoid ── */}
              <div style={S.card}>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,marginBottom:4}}>🚫 Avoid</div>
                <div style={{fontSize:12,color:'#7a7a6a',marginBottom:14,lineHeight:1.6}}>
                  Foods and ingredients you dislike or can't eat. These are excluded from all generated plans and flagged ⚠ in your planner.
                  <span style={{display:'block',marginTop:6,padding:'6px 10px',background:'#fef2f2',borderRadius:7,color:'#991b1b',fontSize:11,fontWeight:600}}>
                    🔒 Meat, fish, shellfish, and alcohol are always excluded regardless of this list.
                  </span>
                </div>
                <div style={{display:'flex',gap:8,marginBottom:12,flexWrap:'wrap'}}>
                  <input style={{...S.inp,flex:1,minWidth:200}}
                    placeholder="e.g. mushrooms, sriracha, beets…"
                    value={prefs.avoidInput||''}
                    onChange={e=>setPrefs(p=>({...p,avoidInput:e.target.value}))}
                    onKeyDown={e=>{ if(e.key==='Enter') addToList('avoidList','avoidInput'); }}/>
                  <button style={{...S.btn('red'),padding:'8px 16px'}} title="Add to Avoid list"

              `DTSTART;VALUE=DATE:${toICSDate(remind)}`,

              'END:VEVENT',
